<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Рэй — загрузка...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #07110f;
      color: #f4f7f5;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    .loader {
      text-align: center;
      animation: pulse 2s ease-in-out infinite;
      z-index: 2;
    }
    .loader h1 {
      font-size: 64px;
      margin: 0;
      color: #32d6b0;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .loader p {
      color: #a8b6b0;
      margin-top: 8px;
      font-size: 16px;
    }
    .loader .sub {
      color: #5a7a72;
      font-size: 13px;
      margin-top: 4px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    /* Скрываем если приложение загружено */
    .loaded .loader { display: none; }
  </style>
</head>
<body>
  <div class="loader" id="loader">
    <h1>Рэй</h1>
    <p>Загрузка приложения...</p>
    <span class="sub">Персональный AI-помощник</span>
  </div>

  <!-- Основной скрипт -->
  <script type="module" src="renderer.js"></script>
</body>
</html>
